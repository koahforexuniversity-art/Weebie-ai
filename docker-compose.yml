services:
  postgres:
    image: postgres:16-alpine
    container_name: forgeagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: forgeagent
      POSTGRES_PASSWORD: forgeagent
      POSTGRES_DB: forgeagent
    ports:
      - "5432:5432"
    volumes:
      - forgeagent_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgeagent"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  forgeagent_pg:
